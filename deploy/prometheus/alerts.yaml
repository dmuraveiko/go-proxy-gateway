groups:
  - name: integration-gateway
    rules:
      - alert: ProxyOldestPendingTooOld
        expr: proxy_oldest_pending_seconds > 300
        for: 5m
        labels: {severity: critical}
      - alert: ProxyOutboxBacklog
        expr: proxy_outbox_pending > 1000
        for: 10m
        labels: {severity: warning}
      - alert: ProxyFailedOperations
        expr: increase(proxy_operations{status="failed"}[5m]) > 0
        labels: {severity: warning}
