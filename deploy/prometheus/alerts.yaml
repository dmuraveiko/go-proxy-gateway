groups:
  - name: http-nats-proxy
    rules:
      - alert: ProxyReadyBacklog
        expr: proxy_requests{status="ready"} > 1000
        for: 10m
        labels: {severity: warning}
      - alert: ProxyPendingDeliveries
        expr: proxy_deliveries_pending > 1000
        for: 10m
        labels: {severity: warning}
      - alert: ProxyUnknownOutcome
        expr: proxy_requests{status="unknown"} > 0
        for: 1m
        labels: {severity: critical}
      - alert: ProxyDispatchingStuck
        expr: proxy_requests{status="dispatching"} > 0
        for: 5m
        labels: {severity: warning}
