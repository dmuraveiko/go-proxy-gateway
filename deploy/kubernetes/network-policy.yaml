apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: http-nats-proxy
spec:
  podSelector:
    matchLabels: {app: integration-gateway}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - {protocol: TCP, port: 8080}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - {protocol: TCP, port: 4222}
        - {protocol: TCP, port: 5432}
    - to:
        - namespaceSelector: {}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    # Business requirement allows arbitrary HTTP/HTTPS destinations and ports.
    # Kubernetes NetworkPolicy cannot verify L7 HTTP; client ACL is the trust boundary.
    - to:
        - ipBlock: {cidr: 0.0.0.0/0}
