services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: proxy
      POSTGRES_PASSWORD: proxy
      POSTGRES_DB: proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxy"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nats:
    image: nats:2.11-alpine
    command: ["--jetstream", "--store_dir=/data"]
    volumes:
      - nats-data:/data

  migrate:
    build: .
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PROXY_DATABASE_URL: postgres://proxy:proxy@postgres:5432/proxy?sslmode=disable
      PROXY_REQUIRE_SIGNATURE: "false"

  proxy:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_started
    environment:
      PROXY_DATABASE_URL: postgres://proxy:proxy@postgres:5432/proxy?sslmode=disable
      PROXY_NATS_URL: nats://nats:4222
      PROXY_REQUIRE_SIGNATURE: "false"
      PROXY_STREAM_REPLICAS: "1"
      PROXY_STREAM_MAX_BYTES: "536870912"
      PROXY_WORKERS: "8"
    ports:
      - "8080:8080"

volumes:
  postgres-data:
  nats-data:
