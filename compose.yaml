services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: proxy
      POSTGRES_PASSWORD: proxy
      POSTGRES_DB: proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxy"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nats:
    image: nats:2.11-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./deploy/nats/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 2s
      timeout: 2s
      retries: 20

  echo:
    image: hashicorp/http-echo:1.0
    command: ["-listen=:5678", "-text=proxy-smoke-ok"]

  migrate:
    build: .
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PROXY_DATABASE_URL: postgres://proxy:proxy@postgres:5432/proxy?sslmode=disable
      PROXY_REQUIRE_SIGNATURE: "false"
      PROXY_ALLOWED_CLIENTS: dev-client

  proxy:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      echo:
        condition: service_started
    environment:
      PROXY_DATABASE_URL: postgres://proxy:proxy@postgres:5432/proxy?sslmode=disable
      PROXY_NATS_URL: nats://nats:4222
      PROXY_REQUIRE_SIGNATURE: "false"
      PROXY_ALLOWED_CLIENTS: dev-client
      PROXY_ID: proxy-main
      PROXY_PUBLIC_BASE_URL: http://localhost:8080
      PROXY_WORKERS: "8"
    ports:
      - "8080:8080"

volumes:
  postgres-data:
